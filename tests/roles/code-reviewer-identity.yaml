# Code Reviewer Identity Test
#
# Confirms the code-reviewer agent loads with correct role description and output schema.
#
# Run:
#   goose run -i tests/roles/code-reviewer-identity.yaml --output-format json

name: code-reviewer-identity
description: Verify the code-reviewer agent loads with correct identity
steps:
  - input: "What is your role? What tools do you have access to? What output format do you use?"
  - expect:
      role: code-reviewer
      tools:
        - github.get_pr_diff
        - github.create_review_comment
        - github.get_pr_comments
      output_schema:
        pr_id: string
        summary: string
        issues: array
        approved: boolean

# Walking Skeleton Integration Test
# Phase 1 — Goose Agent Framework
#
# Tests the end-to-end flow: classify intent → delegate to code-reviewer → collect result.
#
# Run:
#   goose run -i tests/integration/walking-skeleton.yaml --output-format json --max-turns 30

name: walking-skeleton
description: Phase 1 end-to-end test — classify, delegate, collect
steps:
  - input: "Review PR #1 in goose-agent-framework/test-repo"
  - expect:
      intent: code_review
      agent: code-reviewer
      status: completed
      result:
        pr_id: string
        summary: string
        issues: array
        approved: boolean

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Goose Agent Framework — Dashboard</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #1c2129;
        --border: #30363d;
        --text: #c9d1d9;
        --text-muted: #8b949e;
        --green: #3fb950;
        --red: #f85149;
        --yellow: #d2991d;
        --blue: #58a6ff;
        --purple: #bc8cff;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
